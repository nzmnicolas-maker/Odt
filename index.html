<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odonto // Estudos</title>
<script src="marked.umd.js"></script>
<style>
  :root{
    --ink:#14202B;
    --ink-soft:#1C2D3B;
    --paper:#F7F4EC;
    --paper-line:#E4DFD2;
    --pen-blue:#1F5673;
    --pen-blue-soft:#E7EEF0;
    --pen-red:#B23A2E;
    --pen-red-soft:#F4E6E2;
    --graphite:#2B2B28;
    --graphite-soft:#5C5A52;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--serif);
    color:var(--graphite);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ---------- layout shell ---------- */
  .shell{
    display:flex;
    min-height:100vh;
  }
  .sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--ink);
    color:#CFE0E8;
    display:flex;
    flex-direction:column;
    position:fixed;
    top:0; left:0; bottom:0;
    overflow-y:auto;
    transform:translateX(0);
    transition:transform .25s ease;
    z-index:50;
  }
  .sidebar-header{
    padding:22px 20px 14px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .brand{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#7FA8B8;
    margin:0 0 4px;
  }
  .brand strong{color:#F2EFE6;}
  .tagline{
    font-size:11px;
    color:#5E7886;
    margin:0;
  }
  .search-wrap{padding:14px 16px 6px;}
  .search-input{
    width:100%;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    color:#E9ECE3;
    font-family:var(--mono);
    font-size:12.5px;
    padding:9px 10px;
    border-radius:3px;
    outline:none;
  }
  .search-input::placeholder{color:#5E7886;}
  .search-input:focus{border-color:var(--pen-blue);}

  .nav{padding:6px 8px 24px;}
  .period-group{margin-top:6px;}
  .period-toggle{
    width:100%;
    background:none;
    border:none;
    color:#9FBFC9;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.06em;
    text-align:left;
    padding:10px 10px 8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .period-toggle:hover{color:#F2EFE6;}
  .period-toggle .chev{transition:transform .18s ease;}
  .period-group.collapsed .chev{transform:rotate(-90deg);}
  .period-group.collapsed .subject-list{display:none;}
  .subject-list{list-style:none;margin:0;padding:0 2px 4px;}
  .subject-item{
    display:flex;
    align-items:baseline;
    gap:8px;
    width:100%;
    background:none;
    border:none;
    color:#C7D6DA;
    text-align:left;
    font-family:var(--serif);
    font-size:13.5px;
    line-height:1.35;
    padding:7px 10px;
    border-radius:3px;
    cursor:pointer;
  }
  .subject-item .code{
    font-family:var(--mono);
    font-size:10px;
    color:#5E7886;
    flex-shrink:0;
    padding-top:2px;
  }
  .subject-item:hover{background:rgba(255,255,255,.06);color:#F2EFE6;}
  .subject-item.active{background:var(--pen-blue);color:#fff;}
  .subject-item.active .code{color:#cfe6ee;}
  .subject-item .check{
    margin-left:auto;
    flex-shrink:0;
    font-size:11px;
    color:#5FA88B;
    opacity:0;
  }
  .subject-item.done .check{opacity:1;}

  .sidebar-footer{
    margin-top:auto;
    padding:14px 20px 18px;
    font-size:10.5px;
    font-family:var(--mono);
    color:#435863;
    border-top:1px solid rgba(255,255,255,.08);
  }

  /* ---------- main ---------- */
  .main{
    margin-left:280px;
    flex:1;
    min-width:0;
    padding:0 0 80px;
  }
  .topbar{
    display:none;
    position:sticky;
    top:0;
    background:var(--paper);
    border-bottom:1px solid var(--paper-line);
    padding:14px 16px;
    z-index:40;
    align-items:center;
    gap:12px;
  }
  .menu-btn{
    background:var(--ink);
    color:#fff;
    border:none;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.06em;
    padding:9px 12px;
    border-radius:3px;
    cursor:pointer;
  }
  .topbar .brand-mobile{
    font-family:var(--mono);
    font-size:12px;
    color:var(--graphite-soft);
  }

  .content{
    max-width:760px;
    margin:0 auto;
    padding:48px 28px 0;
  }
  .empty-state{
    max-width:520px;
    margin:120px auto 0;
    text-align:center;
    padding:0 24px;
  }
  .empty-state h1{
    font-family:var(--mono);
    font-size:14px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--pen-blue);
    margin-bottom:10px;
  }
  .empty-state p{color:var(--graphite-soft); line-height:1.6;}

  /* specimen label / stamp */
  .stamp{
    border:1.5px solid var(--graphite);
    padding:16px 18px;
    margin-bottom:34px;
    position:relative;
    background:repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(20,32,43,0.025) 28px);
  }
  .stamp::before, .stamp::after{
    content:"";
    position:absolute;
    width:7px; height:7px;
    border:1.5px solid var(--graphite);
    background:var(--paper);
  }
  .stamp::before{top:-4.5px; left:-4.5px;}
  .stamp::after{bottom:-4.5px; right:-4.5px;}
  .stamp-row{
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--graphite-soft);
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .stamp-row span b{color:var(--graphite); font-weight:600;}
  .stamp h1{
    font-family:var(--serif);
    font-size:28px;
    font-weight:700;
    margin:0 0 14px;
    color:var(--ink);
    letter-spacing:-.01em;
  }
  .study-toggle{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.04em;
    text-transform:uppercase;
    border:1.5px solid var(--graphite);
    background:var(--paper);
    color:var(--graphite);
    padding:7px 12px;
    border-radius:2px;
    cursor:pointer;
  }
  .study-toggle.done{
    background:var(--pen-blue);
    border-color:var(--pen-blue);
    color:#fff;
  }

  /* body typography */
  .body-text{font-size:16.5px; line-height:1.7;}
  .body-text h2{
    font-family:var(--serif);
    font-size:21px;
    margin:38px 0 14px;
    color:var(--ink);
    border-bottom:1px solid var(--paper-line);
    padding-bottom:8px;
  }
  .body-text h3{
    font-family:var(--serif);
    font-size:17.5px;
    margin:26px 0 10px;
    color:var(--ink-soft);
  }
  .body-text p{margin:0 0 14px;}
  .body-text ul, .body-text ol{margin:0 0 16px; padding-left:22px;}
  .body-text li{margin-bottom:6px;}
  .body-text strong{color:var(--ink); font-weight:700;}
  .body-text table{
    width:100%;
    border-collapse:collapse;
    margin:18px 0 22px;
    font-size:14.5px;
  }
  .body-text th, .body-text td{
    border:1px solid var(--paper-line);
    padding:8px 10px;
    text-align:left;
    vertical-align:top;
  }
  .body-text th{
    background:#EFEAD9;
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.03em;
    color:var(--graphite-soft);
  }
  .body-text hr{
    border:none;
    border-top:1px solid var(--paper-line);
    margin:32px 0;
  }
  .body-text em{color:var(--graphite-soft);}

  .callout{
    border-left:3px solid var(--pen-blue);
    background:var(--pen-blue-soft);
    padding:12px 16px;
    margin:18px 0 22px;
    border-radius:0 3px 3px 0;
  }
  .callout.warning{
    border-left-color:var(--pen-red);
    background:var(--pen-red-soft);
  }
  .callout-title{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-weight:600;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .callout.info .callout-title{color:var(--pen-blue);}
  .callout.tip .callout-title{color:var(--pen-blue);}
  .callout.warning .callout-title{color:var(--pen-red);}
  .callout p:last-child{margin-bottom:0;}

  .review-block{
    margin-top:44px;
    padding-top:24px;
    border-top:2px solid var(--graphite);
  }

  @media (max-width: 880px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0); box-shadow:0 0 40px rgba(0,0,0,.4);}
    .main{margin-left:0;}
    .topbar{display:flex;}
    .content{padding:30px 18px 0;}
    .stamp h1{font-size:23px;}
    .overlay{
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      z-index:45; display:none;
    }
    .overlay.show{display:block;}
  }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <p class="brand">ODONTO // <strong>ESTUDOS</strong></p>
      <p class="tagline">Grade curricular &mdash; 3º ao 7º período</p>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="buscar disciplina...">
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">feito à mão, matéria por matéria.</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰ MENU</button>
      <span class="brand-mobile" id="topbarTitle">ODONTO // ESTUDOS</span>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <h1>Selecione uma disciplina</h1>
        <p>Use o menu ao lado para escolher o período e a matéria que você quer revisar. Seu progresso de estudo fica salvo neste dispositivo.</p>
      </div>
    </div>
  </div>
</div>

<script src="site-data.js"></script>
<script>
(function(){
  const nav = document.getElementById('nav');
  const content = document.getElementById('content');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const menuBtn = document.getElementById('menuBtn');
  const topbarTitle = document.getElementById('topbarTitle');
  const searchInput = document.getElementById('searchInput');

  const STORAGE_KEY = 'odonto-estudos-progresso';
  function getProgress(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ return {}; }
  }
  function setProgress(p){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
  }

  let activeSlug = null;

  function buildNav(filterText){
    nav.innerHTML = '';
    const progress = getProgress();
    const ft = (filterText||'').toLowerCase().trim();

    SITE_DATA.forEach(periodObj => {
      const subjects = periodObj.subjects.filter(s =>
        !ft || s.disciplina.toLowerCase().includes(ft)
      );
      if(ft && subjects.length === 0) return;

      const group = document.createElement('div');
      group.className = 'period-group';

      const toggle = document.createElement('button');
      toggle.className = 'period-toggle';
      toggle.innerHTML = `<span>${periodObj.label}</span><span class="chev">▾</span>`;
      toggle.onclick = () => group.classList.toggle('collapsed');
      group.appendChild(toggle);

      const list = document.createElement('ul');
      list.className = 'subject-list';

      subjects.forEach(s => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'subject-item' + (s.slug === activeSlug ? ' active' : '') + (progress[s.slug] ? ' done' : '');
        btn.innerHTML = `<span>${s.disciplina}</span><span class="code">${s.codigo||''}</span><span class="check">✓</span>`;
        btn.onclick = () => openSubject(s);
        li.appendChild(btn);
        list.appendChild(li);
      });

      group.appendChild(list);
      nav.appendChild(group);
    });
  }

  function findSubject(slug){
    for(const p of SITE_DATA){
      const s = p.subjects.find(x => x.slug === slug);
      if(s) return s;
    }
    return null;
  }

  // ---- Obsidian-style callout parser: > [!tip] Title \n> body ----
  function preprocessCallouts(md){
    const lines = md.split('\n');
    let out = [];
    let i = 0;
    while(i < lines.length){
      const m = lines[i].match(/^>\s*\[!(\w+)\]\s*(.*)$/);
      if(m){
        const type = m[1].toLowerCase();
        const title = m[2].trim();
        let body = [];
        i++;
        while(i < lines.length && /^>/.test(lines[i])){
          body.push(lines[i].replace(/^>\s?/, ''));
          i++;
        }
        const cls = type === 'warning' ? 'warning' : (type === 'tip' ? 'tip' : 'info');
        const icon = cls === 'warning' ? '⚠' : (cls === 'tip' ? '✓' : 'i');
        const innerHtml = marked.parse(body.join('\n'));
        out.push(`<div class="callout ${cls}"><div class="callout-title">${icon} ${title}</div>${innerHtml}</div>`);
      } else {
        out.push(lines[i]);
        i++;
      }
    }
    return out.join('\n');
  }

  function openSubject(s){
    activeSlug = s.slug;
    const progress = getProgress();
    const done = !!progress[s.slug];

    const calloutHtml = preprocessCallouts(s.body);
    // remove callout source lines already converted to html blocks, then parse rest as markdown
    const htmlBody = marked.parse(calloutHtml, { gfm: true, breaks: false });

    content.innerHTML = `
      <div class="stamp">
        <div class="stamp-row">
          <span>código <b>${s.codigo || '—'}</b></span>
          <span>carga <b>${s.carga_horaria || '—'}</b></span>
          <span>nível <b>${s.periodo || '—'}</b></span>
        </div>
        <h1>${s.disciplina}</h1>
        <button class="study-toggle ${done ? 'done' : ''}" id="studyBtn">
          ${done ? '✓ Estudada' : 'Marcar como estudada'}
        </button>
      </div>
      <div class="body-text">${htmlBody}</div>
    `;

    document.getElementById('studyBtn').onclick = () => {
      const p = getProgress();
      p[s.slug] = !p[s.slug];
      setProgress(p);
      openSubject(s);
      buildNav(searchInput.value);
    };

    topbarTitle.textContent = s.disciplina;
    buildNav(searchInput.value);
    closeSidebarMobile();
    window.scrollTo(0,0);
  }

  function closeSidebarMobile(){
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }

  menuBtn.onclick = () => {
    sidebar.classList.add('open');
    overlay.classList.add('show');
  };
  overlay.onclick = closeSidebarMobile;

  searchInput.addEventListener('input', (e) => buildNav(e.target.value));

  buildNav('');

  // open first subject by default on desktop-wide screens isn't necessary; keep empty state.
})();
</script>
</body>
</html>
